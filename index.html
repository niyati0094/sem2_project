<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h1>Create Your Portfolio</h1>

    <input type="text" id="name" placeholder="Name">

    <input type="text" id="photo" placeholder="Photo URL">

    <textarea id="about" placeholder="About Yourself"></textarea>

    <input type="text" id="education" placeholder="Education">

    <input type="text" id="skills" placeholder="Skills">

    <textarea id="projects" placeholder="Projects"></textarea>

    <input type="email" id="email" placeholder="Email">

    <input type="text" id="phone" placeholder="Phone Number">

    <button onclick="saveData()">Generate Portfolio</button>
</div>

<script src="script.js"></script>

</body>
</html>
